<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Golden Glow Salon | Layanan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="header-container">

            <div class="logo-title">
                <img src="logo-salon.png" width="50">
                <h1>GOLDEN GLOW SALON</h1>
            </div>

            <div class="search-box">
                <input type="text" id="search" placeholder="Cari..." class="form-control mb-3">
            </div>

        </div>
    </header>

    <!-- SIDEBAR -->
    <nav>
        <a href="index.html">Beranda</a>
        <a href="booking.html">Booking</a>
        <a href="layanan.html" class="active">Layanan</a>
        <a href="laporan.html">Laporan Keuangan</a>
    </nav>

    <!-- MAIN -->
    <main>
        <div class="d-sm-flex align-items-center justify-content-between mb-4">
            <h1 class="h3 mb-0 text-gray-800">Daftar Layanan</h1>
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button class="btn btn-primary me-md-2" type="button" id="btnTambah">Tambah Layanan</button>
            </div>
        </div>
        <table border="1" id="dataLayanan">
            <thead>
                <tr class="text-center">
                    <th>Kode</th>
                    <th>Nama</th>
                    <th>Harga</th>
                    <th>Aksi</th>
                </tr>

            </thead>
            <tbody id="tbodyLayanan"></tbody>
        </table>
    </main>

    <!-- modal tambah -->
    <div id="modal" class="modal">
        <div class="modal-content">

            <span class="close">&times;</span>
            <h3>Tambah Layanan</h3>

            <form id="formLayanan">
                <div class="mb-3">
                    <input type="text" class="form-control" id="kode" placeholder="Masukkan Kode" required>
                </div>
                <div class="mb-3">
                    <input type="text" class="form-control" id="nama" placeholder="Masukkan Nama Layanan" required>
                </div>
                <div class="mb-3">
                    <input type="number" class="form-control" id="harga" placeholder="Masukkan Harga" required>
                </div>
                <button type="submit" class="btn btn-primary">Simpan</button>
            </form>
        </div>
    </div>

    <!-- modal edit -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="editModal">Edit Layanan</h3>

            <form id="formLayanan">
                <div class="mb-3">
                    <input type="text" class="form-control" id="kode" placeholder="Masukkan Kode" required>
                </div>
                <div class="mb-3">
                    <input type="text" class="form-control" id="nama" placeholder="Masukkan Nama Layanan" required>
                </div>
                <div class="mb-3">
                    <input type="number" class="form-control" id="harga" placeholder="Masukkan Harga" required>
                </div>
                <button type="submit" id="btnUbah" class="btn btn-primary">
                    Ubah
                </button>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>Kontak Kami</p>
        <table>
            <tr>
                <td><img src="logo-alamat.png" width="25"></td>
                <td>Alamat : Jln.Mawar No.15</td>
                <td><img src="logo-ig.png" width="25"></td>
                <td>@goldenglowid</td>
            </tr>
            <tr>
                <td><img src="logo-wa.png" width="25"></td>
                <td>+6282140325310</td>
                <td><img src="logo-email.png" width="25"></td>
                <td>goldenglowsalon@gmail.com</td>
            </tr>
        </table>
        <hr>
        <p>&copy; 2026 Golden Glow Salon</p>
    </footer>
    <script src="script.js"></script>

</body>

</html>
